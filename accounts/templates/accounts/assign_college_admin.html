{% extends 'accounts/base.html' %}

{% block title %}Assign College Admin{% endblock %}
{% block page_title %}Assign College Admin{% endblock %}

{% block content %}

<form method="POST" class="card" style="max-width:500px;">
  {% csrf_token %}

  <h3>Assign College Admin</h3>

  <p><strong>User:</strong> {{ user_obj.username }}</p>

  <label>Select College</label>
  <select name="college" required>
    {% for college in colleges %}
      <option value="{{ college.id }}">{{ college.name }}</option>
    {% endfor %}
  </select>

  <button type="submit" class="btn btn-primary">
    Assign Admin
  </button>

</form>

{% endblock %}
